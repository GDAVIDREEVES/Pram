<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wriggle Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #E8836B;
      --primary-light: #F2A898;
      --primary-dark: #D06A52;
      --accent: #6BB8A8;
      --accent-light: #A0D5C9;
      --blush: #FDE8E0;
      --cream: #FFF8F4;
      --text: #1A1A2E;
      --text-secondary: #6B6B80;
      --text-tertiary: #A0A0B0;
      --bg: #FFF8F4;
      --card: #FFFFFF;
      --bg-secondary: #F5F0EB;
      --border: #EDE5DE;
      --border-light: #F5F0EB;
      --success: #4CAF50;
      --error: #E74C3C;
      --warning: #F5C469;
      --info: #5B9BD5;
      --sidebar-w: 240px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Login ────────────────────────────── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .login-card {
      background: var(--card); border-radius: 16px; padding: 40px 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06); max-width: 380px; width: 100%; text-align: center;
    }
    .login-card h1 { font-size: 28px; color: var(--primary); margin-bottom: 4px; }
    .login-card p { color: var(--text-secondary); margin-bottom: 24px; font-size: 14px; }
    .login-card select {
      width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px;
      font-family: inherit; font-size: 15px; background: var(--bg); color: var(--text);
      margin-bottom: 16px; appearance: none; cursor: pointer;
    }
    .login-card .error-msg { color: var(--error); font-size: 13px; margin-bottom: 12px; min-height: 20px; }

    /* ── Buttons ──────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 20px; border: none; border-radius: 10px;
      font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-danger { background: var(--error); color: #fff; }
    .btn-ghost { background: transparent; color: var(--text-secondary); }
    .btn-sm { padding: 6px 12px; font-size: 13px; border-radius: 8px; }
    .btn-block { width: 100%; }

    /* ── Layout ───────────────────────────── */
    #app { display: none; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: var(--sidebar-w); background: var(--card); border-right: 1px solid var(--border);
      padding: 24px 0; display: flex; flex-direction: column; position: fixed;
      top: 0; left: 0; bottom: 0; z-index: 10;
    }
    .sidebar-brand { padding: 0 20px 24px; font-size: 22px; font-weight: 700; color: var(--primary); }
    .sidebar-nav { flex: 1; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 11px 20px;
      color: var(--text-secondary); font-size: 14px; font-weight: 600; cursor: pointer;
      border-left: 3px solid transparent; transition: all .15s;
    }
    .nav-item:hover { background: var(--bg); color: var(--text); }
    .nav-item.active { color: var(--primary); border-left-color: var(--primary); background: var(--blush); }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
    .sidebar-footer .admin-name { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }

    .main { margin-left: var(--sidebar-w); flex: 1; padding: 28px 32px; max-width: 1200px; }
    .page-title { font-size: 22px; font-weight: 700; margin-bottom: 20px; }

    /* ── Stats cards ──────────────────────── */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--card); border-radius: 14px; padding: 20px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.04);
    }
    .stat-card .label { font-size: 12px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .5px; }
    .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
    .stat-card .value.primary { color: var(--primary); }
    .stat-card .value.accent { color: var(--accent); }
    .stat-card .value.info { color: var(--info); }
    .stat-card .value.warning { color: var(--warning); }

    /* ── Chart bars ───────────────────────── */
    .bar-chart { margin-bottom: 28px; }
    .bar-chart h3 { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .bar-label { width: 130px; font-size: 13px; color: var(--text-secondary); text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; height: 22px; background: var(--bg-secondary); border-radius: 6px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; padding-left: 8px; font-size: 11px; font-weight: 700; color: #fff; min-width: 28px; transition: width .4s ease; }
    .bar-count { width: 30px; font-size: 13px; font-weight: 600; color: var(--text); }

    /* ── Interest tags ────────────────────── */
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
    .tag { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; background: var(--blush); color: var(--primary-dark); }

    /* ── Tables ───────────────────────────── */
    .table-toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
    .search-input {
      padding: 9px 14px; border: 1px solid var(--border); border-radius: 10px; font-family: inherit;
      font-size: 14px; background: var(--card); color: var(--text); min-width: 240px;
    }
    .search-input::placeholder { color: var(--text-tertiary); }
    .filter-select {
      padding: 9px 14px; border: 1px solid var(--border); border-radius: 10px; font-family: inherit;
      font-size: 14px; background: var(--card); color: var(--text); cursor: pointer;
    }
    table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 14px; overflow: hidden; box-shadow: 0 1px 8px rgba(0,0,0,0.04); }
    thead { background: var(--bg-secondary); }
    th { text-align: left; padding: 12px 14px; font-size: 12px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .5px; }
    td { padding: 12px 14px; font-size: 14px; border-top: 1px solid var(--border-light); vertical-align: top; }
    tr:hover td { background: var(--bg); }
    .badge-pill {
      display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600;
    }
    .badge-admin { background: var(--blush); color: var(--primary-dark); }
    .badge-active { background: #E8F5E9; color: #2E7D32; }
    .badge-post { background: var(--blush); color: var(--primary-dark); }
    .badge-checkin { background: #E0F2F1; color: #00695C; }
    .badge-meetup { background: #FFF3E0; color: #E65100; }
    .truncate { max-width: 320px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .kids-list { font-size: 13px; color: var(--text-secondary); }
    .interests-cell { display: flex; flex-wrap: wrap; gap: 4px; max-width: 260px; }
    .interest-chip { padding: 2px 8px; border-radius: 10px; font-size: 11px; background: var(--bg-secondary); color: var(--text-secondary); }

    /* ── Detail panel ─────────────────────── */
    .detail-panel {
      background: var(--card); border-radius: 14px; padding: 24px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.04); margin-bottom: 20px;
    }
    .detail-panel h3 { font-size: 17px; margin-bottom: 14px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 24px; }
    .detail-grid .field-label { font-size: 12px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .5px; }
    .detail-grid .field-value { font-size: 14px; margin-bottom: 8px; }

    /* ── Messages ──────────────────────────── */
    .msg-group { margin-bottom: 20px; }
    .msg-group-header { font-size: 14px; font-weight: 700; margin-bottom: 8px; padding: 8px 14px; background: var(--bg-secondary); border-radius: 10px; }
    .msg-row { display: flex; gap: 10px; padding: 8px 14px; border-bottom: 1px solid var(--border-light); font-size: 14px; }
    .msg-sender { font-weight: 600; min-width: 120px; }
    .msg-content { flex: 1; color: var(--text-secondary); }
    .msg-time { font-size: 12px; color: var(--text-tertiary); white-space: nowrap; }
    .msg-unread { font-weight: 600; color: var(--text); }

    /* ── Empty state ──────────────────────── */
    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-tertiary); }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: .4; }
    .empty-state p { font-size: 15px; }

    /* ── Responsive ───────────────────────── */
    @media (max-width: 768px) {
      .sidebar { width: 100%; position: relative; border-right: none; border-bottom: 1px solid var(--border); padding: 12px 0; }
      .sidebar-nav { display: flex; overflow-x: auto; gap: 2px; padding: 0 8px; }
      .nav-item { border-left: none; border-bottom: 3px solid transparent; padding: 8px 14px; white-space: nowrap; }
      .nav-item.active { border-bottom-color: var(--primary); border-left-color: transparent; }
      .layout { flex-direction: column; }
      .main { margin-left: 0; padding: 16px; }
      .sidebar-brand { padding: 0 16px 8px; font-size: 18px; }
      .sidebar-footer { display: none; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
    }

    /* ── Confirm dialog ───────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(26,26,46,0.45); display: flex;
      align-items: center; justify-content: center; z-index: 100;
    }
    .modal-card {
      background: var(--card); border-radius: 16px; padding: 28px 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12); max-width: 380px; width: 90%; text-align: center;
    }
    .modal-card h3 { margin-bottom: 8px; }
    .modal-card p { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; justify-content: center; }
  </style>
</head>
<body>

<!-- ── Login Screen ──────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <h1>Wriggle</h1>
    <p>Admin Dashboard</p>
    <div class="error-msg" id="login-error"></div>
    <select id="login-user">
      <option value="">Select an admin user...</option>
    </select>
    <button class="btn btn-primary btn-block" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- ── Main App ──────────────────────────────── -->
<div id="app">
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand">Wriggle Admin</div>
      <nav class="sidebar-nav">
        <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </div>
        <div class="nav-item" data-page="users" onclick="navigate('users')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
          Users
        </div>
        <div class="nav-item" data-page="posts" onclick="navigate('posts')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          Posts
        </div>
        <div class="nav-item" data-page="messages" onclick="navigate('messages')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Messages
        </div>
        <div class="nav-item" data-page="activity" onclick="navigate('activity')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Activity
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="admin-name" id="admin-name"></div>
        <button class="btn btn-ghost btn-sm" onclick="doLogout()">Sign out</button>
      </div>
    </aside>

    <main class="main">
      <!-- Dashboard -->
      <section id="page-dashboard" class="page">
        <h2 class="page-title">Dashboard</h2>
        <div class="stats-grid" id="stats-grid"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
          <div class="bar-chart" id="neighborhood-chart"></div>
          <div>
            <h3 style="font-size:15px;font-weight:700;margin-bottom:12px">Top Interests</h3>
            <div class="tag-cloud" id="interest-tags"></div>
          </div>
        </div>
      </section>

      <!-- Users -->
      <section id="page-users" class="page" style="display:none">
        <h2 class="page-title">Users</h2>
        <div id="user-detail-container"></div>
        <div class="table-toolbar">
          <input class="search-input" id="user-search" placeholder="Search users..." oninput="loadUsers()" />
        </div>
        <div id="users-table-wrap"></div>
      </section>

      <!-- Posts -->
      <section id="page-posts" class="page" style="display:none">
        <h2 class="page-title">Content &mdash; Posts</h2>
        <div class="table-toolbar">
          <select class="filter-select" id="post-type-filter" onchange="loadPosts()">
            <option value="">All types</option>
            <option value="post">Post</option>
            <option value="checkin">Check-in</option>
            <option value="meetup">Meetup</option>
          </select>
        </div>
        <div id="posts-table-wrap"></div>
      </section>

      <!-- Messages -->
      <section id="page-messages" class="page" style="display:none">
        <h2 class="page-title">Messages</h2>
        <div id="messages-wrap"></div>
      </section>

      <!-- Activity -->
      <section id="page-activity" class="page" style="display:none">
        <h2 class="page-title">Activity</h2>
        <h3 style="font-size:16px;margin-bottom:12px">Matches</h3>
        <div id="matches-wrap" style="margin-bottom:28px"></div>
        <h3 style="font-size:16px;margin-bottom:12px">Broadcasts</h3>
        <div id="broadcasts-wrap"></div>
      </section>
    </main>
  </div>
</div>

<!-- ── Confirm modal ─────────────────────────── -->
<div id="confirm-modal" class="modal-overlay" style="display:none">
  <div class="modal-card">
    <h3 id="confirm-title">Confirm</h3>
    <p id="confirm-message"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" id="confirm-action-btn" onclick="confirmAction()">Delete</button>
    </div>
  </div>
</div>

<script>
const API = '/api/admin';
let usersCache = [];
let pendingConfirm = null;

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    credentials: 'include',
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    ...opts,
  });
  if (res.status === 401 || res.status === 403) { showLogin(); throw new Error('auth'); }
  return res.json();
}

function esc(s) {
  const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML;
}
function relTime(ts) {
  if (!ts) return '';
  const s = ts.toString();
  if (s === 'now' || s.endsWith('ago')) return s;
  const d = new Date(ts);
  if (isNaN(d.getTime())) return s;
  const diff = Date.now() - d.getTime();
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  return Math.floor(diff/86400000) + 'd ago';
}
function userName(id) {
  const u = usersCache.find(u => u.id === id);
  return u ? u.name : id;
}

/* ── Auth ────────────────────────────────── */
async function initApp() {
  try {
    const me = await api('/me');
    document.getElementById('admin-name').textContent = 'Signed in as ' + me.name;
    showApp();
    await Promise.all([loadAllUsers(), loadDashboard()]);
  } catch { showLogin(); }
}

async function doLogin() {
  const sel = document.getElementById('login-user');
  const userId = sel.value;
  if (!userId) { document.getElementById('login-error').textContent = 'Select a user'; return; }
  try {
    const r = await fetch(API + '/login', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId }),
    });
    const data = await r.json();
    if (!r.ok) { document.getElementById('login-error').textContent = data.error; return; }
    document.getElementById('admin-name').textContent = 'Signed in as ' + data.user.name;
    showApp();
    await Promise.all([loadAllUsers(), loadDashboard()]);
  } catch (e) { document.getElementById('login-error').textContent = 'Login failed'; }
}

async function doLogout() {
  await fetch(API + '/logout', { method: 'POST', credentials: 'include' });
  showLogin();
}

function showLogin() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  populateLoginDropdown();
}
function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

async function populateLoginDropdown() {
  try {
    const res = await fetch(API + '/login', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: '__probe__' }),
    });
  } catch {}
  const sel = document.getElementById('login-user');
  sel.innerHTML = '<option value="">Select an admin user...</option><option value="user_current">Sarah Chen (user_current)</option>';
}

/* ── Navigation ──────────────────────────── */
function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  document.getElementById('page-' + page).style.display = 'block';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === page));
  if (page === 'dashboard') loadDashboard();
  if (page === 'users') loadUsers();
  if (page === 'posts') loadPosts();
  if (page === 'messages') loadMessages();
  if (page === 'activity') loadActivity();
}

/* ── Dashboard ───────────────────────────── */
async function loadDashboard() {
  try {
    const s = await api('/stats');
    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card"><div class="label">Total Users</div><div class="value primary">${s.totalUsers}</div></div>
      <div class="stat-card"><div class="label">Total Posts</div><div class="value accent">${s.totalPosts}</div></div>
      <div class="stat-card"><div class="label">Messages</div><div class="value info">${s.totalMessages}</div></div>
      <div class="stat-card"><div class="label">Matches</div><div class="value warning">${s.totalMatches}</div></div>
      <div class="stat-card"><div class="label">Active Now</div><div class="value primary">${s.activeUsers}</div></div>
      <div class="stat-card"><div class="label">Total Likes</div><div class="value accent">${s.totalLikes}</div></div>
      <div class="stat-card"><div class="label">Comments</div><div class="value info">${s.totalComments}</div></div>
      <div class="stat-card"><div class="label">Avg Kids/User</div><div class="value warning">${s.avgKidsPerUser}</div></div>
    `;
    const maxN = Math.max(...Object.values(s.neighborhoodCounts));
    const colors = ['var(--primary)', 'var(--accent)', 'var(--info)', 'var(--warning)', 'var(--primary-light)', 'var(--accent-light)'];
    let barsHtml = '<h3>Users by Neighborhood</h3>';
    Object.entries(s.neighborhoodCounts).sort((a,b) => b[1]-a[1]).forEach(([name, count], i) => {
      const pct = (count / maxN * 100).toFixed(0);
      barsHtml += `<div class="bar-row"><div class="bar-label">${esc(name)}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colors[i%colors.length]}">${count}</div></div></div>`;
    });
    document.getElementById('neighborhood-chart').innerHTML = barsHtml;

    let tagsHtml = '';
    s.topInterests.forEach(t => { tagsHtml += `<span class="tag">${esc(t.name)} (${t.count})</span>`; });
    document.getElementById('interest-tags').innerHTML = tagsHtml;
  } catch {}
}

/* ── Users ───────────────────────────────── */
async function loadAllUsers() {
  usersCache = await api('/users');
}

async function loadUsers() {
  const search = document.getElementById('user-search').value;
  const users = search
    ? usersCache.filter(u => u.name.toLowerCase().includes(search.toLowerCase()) || u.neighborhood.toLowerCase().includes(search.toLowerCase()))
    : usersCache;
  let html = '<table><thead><tr><th>Name</th><th>Neighborhood</th><th>Kids</th><th>Interests</th><th>Status</th><th>Last Active</th><th>Actions</th></tr></thead><tbody>';
  if (users.length === 0) {
    html += '<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text-tertiary)">No users found</td></tr>';
  }
  users.forEach(u => {
    const badges = [];
    if (u.isAdmin) badges.push('<span class="badge-pill badge-admin">Admin</span>');
    if (u.hangNow) badges.push('<span class="badge-pill badge-active">Active</span>');
    const kids = u.kids.map(k => `${k.name} (${k.ageLabel || k.age})`).join(', ');
    const interests = u.interests.slice(0, 4).map(i => `<span class="interest-chip">${esc(i)}</span>`).join('') + (u.interests.length > 4 ? `<span class="interest-chip">+${u.interests.length - 4}</span>` : '');
    html += `<tr>
      <td><strong>${esc(u.name)}</strong></td>
      <td>${esc(u.neighborhood)}</td>
      <td class="kids-list">${esc(kids)}</td>
      <td><div class="interests-cell">${interests}</div></td>
      <td>${badges.join(' ')}</td>
      <td style="white-space:nowrap">${esc(u.lastActive)}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-ghost btn-sm" onclick="viewUser('${u.id}')">View</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleAdmin('${u.id}', ${!u.isAdmin})">${u.isAdmin ? 'Remove Admin' : 'Make Admin'}</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDeleteUser('${u.id}', '${esc(u.name)}')">Delete</button>
      </td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('users-table-wrap').innerHTML = html;
}

async function viewUser(id) {
  const u = await api('/users/' + id);
  const kids = u.kids.map(k => `${k.name} (${k.ageLabel || k.age}, ${k.gender})`).join(', ');
  const tags = (u.vibeTags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('');
  document.getElementById('user-detail-container').innerHTML = `
    <div class="detail-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <h3>${esc(u.name)}</h3>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('user-detail-container').innerHTML=''">Close</button>
      </div>
      <div class="detail-grid">
        <div><div class="field-label">ID</div><div class="field-value" style="font-family:monospace;font-size:12px">${esc(u.id)}</div></div>
        <div><div class="field-label">Age</div><div class="field-value">${u.age}</div></div>
        <div><div class="field-label">Neighborhood</div><div class="field-value">${esc(u.neighborhood)}</div></div>
        <div><div class="field-label">Kids</div><div class="field-value">${esc(kids) || 'None'}</div></div>
        <div><div class="field-label">Bio</div><div class="field-value">${esc(u.bio)}</div></div>
        <div><div class="field-label">Verified</div><div class="field-value">${u.verified ? 'Yes' : 'No'}</div></div>
        <div><div class="field-label">Admin</div><div class="field-value">${u.isAdmin ? 'Yes' : 'No'}</div></div>
        <div><div class="field-label">Hang Now</div><div class="field-value">${u.hangNow ? 'Yes' : 'No'}</div></div>
      </div>
      ${tags ? '<div style="margin-top:14px"><div class="field-label" style="margin-bottom:6px;font-size:12px;font-weight:600;color:var(--text-tertiary)">VIBE TAGS</div><div class="tag-cloud">' + tags + '</div></div>' : ''}
    </div>`;
  document.getElementById('user-detail-container').scrollIntoView({ behavior: 'smooth' });
}

async function toggleAdmin(id, makeAdmin) {
  await api('/users/' + id, { method: 'PATCH', body: JSON.stringify({ isAdmin: makeAdmin }) });
  await loadAllUsers();
  loadUsers();
}

function confirmDeleteUser(id, name) {
  pendingConfirm = async () => {
    await api('/users/' + id, { method: 'DELETE' });
    await loadAllUsers();
    loadUsers();
    document.getElementById('user-detail-container').innerHTML = '';
  };
  document.getElementById('confirm-title').textContent = 'Delete User';
  document.getElementById('confirm-message').textContent = 'Are you sure you want to delete ' + name + '? This cannot be undone.';
  document.getElementById('confirm-action-btn').textContent = 'Delete';
  document.getElementById('confirm-modal').style.display = 'flex';
}

/* ── Posts ────────────────────────────────── */
async function loadPosts() {
  const type = document.getElementById('post-type-filter').value;
  const posts = await api('/posts' + (type ? '?type=' + type : ''));
  let html = '<table><thead><tr><th>Author</th><th>Content</th><th>Type</th><th>Likes</th><th>Comments</th><th>Time</th><th>Actions</th></tr></thead><tbody>';
  if (posts.length === 0) {
    html += '<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text-tertiary)">No posts found</td></tr>';
  }
  posts.forEach(p => {
    const typeBadge = { post: 'badge-post', checkin: 'badge-checkin', meetup: 'badge-meetup' }[p.type] || 'badge-post';
    html += `<tr>
      <td><strong>${esc(userName(p.authorId))}</strong></td>
      <td class="truncate">${esc(p.content)}</td>
      <td><span class="badge-pill ${typeBadge}">${esc(p.type)}</span></td>
      <td>${p.likes}</td>
      <td>${p.comments.length}</td>
      <td style="white-space:nowrap">${relTime(p.timestamp)}</td>
      <td><button class="btn btn-danger btn-sm" onclick="confirmDeletePost('${p.id}')">Delete</button></td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('posts-table-wrap').innerHTML = html;
}

function confirmDeletePost(id) {
  pendingConfirm = async () => { await api('/posts/' + id, { method: 'DELETE' }); loadPosts(); };
  document.getElementById('confirm-title').textContent = 'Delete Post';
  document.getElementById('confirm-message').textContent = 'Are you sure you want to delete this post?';
  document.getElementById('confirm-action-btn').textContent = 'Delete';
  document.getElementById('confirm-modal').style.display = 'flex';
}

/* ── Messages ────────────────────────────── */
async function loadMessages() {
  const messages = await api('/messages');
  const matches = await api('/matches');
  const grouped = {};
  messages.forEach(m => {
    if (!grouped[m.matchId]) grouped[m.matchId] = [];
    grouped[m.matchId].push(m);
  });

  let html = '';
  if (Object.keys(grouped).length === 0) {
    html = '<div class="empty-state"><p>No messages yet</p></div>';
  }
  for (const [matchId, msgs] of Object.entries(grouped)) {
    const match = matches.find(m => m.id === matchId);
    const otherName = match ? userName(match.momId) : matchId;
    html += `<div class="msg-group"><div class="msg-group-header">Conversation with ${esc(otherName)} (${msgs.length} messages)</div>`;
    msgs.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp)).forEach(m => {
      html += `<div class="msg-row ${m.read ? '' : 'msg-unread'}">
        <div class="msg-sender">${esc(userName(m.senderId))}</div>
        <div class="msg-content">${esc(m.content)}</div>
        <div class="msg-time">${relTime(m.timestamp)}</div>
      </div>`;
    });
    html += '</div>';
  }
  document.getElementById('messages-wrap').innerHTML = html;
}

/* ── Activity ────────────────────────────── */
async function loadActivity() {
  const matches = await api('/matches');
  const broadcasts = await api('/broadcasts');

  let mHtml = '';
  if (matches.length === 0) {
    mHtml = '<div class="empty-state"><p>No matches yet</p></div>';
  } else {
    mHtml = '<table><thead><tr><th>Match ID</th><th>User</th><th>Matched</th><th>Last Message</th><th>Time</th></tr></thead><tbody>';
    matches.forEach(m => {
      mHtml += `<tr>
        <td style="font-family:monospace;font-size:12px">${esc(m.id)}</td>
        <td><strong>${esc(userName(m.momId))}</strong></td>
        <td>${m.matched ? '<span class="badge-pill badge-active">Yes</span>' : 'No'}</td>
        <td class="truncate">${esc(m.lastMessage || '')}</td>
        <td style="white-space:nowrap">${relTime(m.timestamp)}</td>
      </tr>`;
    });
    mHtml += '</tbody></table>';
  }
  document.getElementById('matches-wrap').innerHTML = mHtml;

  let bHtml = '';
  if (broadcasts.length === 0) {
    bHtml = '<div class="empty-state"><p>No broadcasts yet</p></div>';
  } else {
    bHtml = '<table><thead><tr><th>User</th><th>Location</th><th>Message</th><th>Audience</th><th>Responses</th><th>Time</th></tr></thead><tbody>';
    broadcasts.forEach(b => {
      bHtml += `<tr>
        <td><strong>${esc(userName(b.userId))}</strong></td>
        <td>${esc(b.locationName)}</td>
        <td class="truncate">${esc(b.message)}</td>
        <td>${esc(b.audience)}</td>
        <td>${b.responses.length}</td>
        <td style="white-space:nowrap">${relTime(b.timestamp)}</td>
      </tr>`;
    });
    bHtml += '</tbody></table>';
  }
  document.getElementById('broadcasts-wrap').innerHTML = bHtml;
}

/* ── Confirm dialog helpers ──────────────── */
function closeConfirm() {
  document.getElementById('confirm-modal').style.display = 'none';
  pendingConfirm = null;
}
async function confirmAction() {
  if (pendingConfirm) await pendingConfirm();
  closeConfirm();
}

/* ── Init ────────────────────────────────── */
initApp();
</script>
</body>
</html>
